on: 
  push:
    branches: [ "main" ]
    tags: ["v*"]
    workflow_dispatch:

name: Build backend on Linux

jobs:
  build:
    name: Build binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@master
      - name: Install requirements for building binary
        run: .github/get-build-requirements
      - name: Build binary
        run: make
      - name: Build .deb
        run: make deb
      - name: Upload .deb
        uses: softprops/action-gh-release@v2
        with:
          name: lindeb
          files: build/qplot*deb
          token: ${{github.TOKEN}}
          retention-days: 3

  release:
    name: Create release and publish to Github
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lindeb
          path: build/
      - name: Upload .deb
        uses: softprops/action-gh-release@v2
        with:
          files: build/qplot*deb
          token: ${{github.TOKEN}}
                  
    
